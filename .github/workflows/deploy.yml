# Cloud Run デプロイ（層A＝配信・設計コンテキスト §11/§12）。WIF（鍵レス）＋ Artifact Registry。
# 設計の「層A は前提点・こなれた普通で十分」に沿い、`gcloud run deploy --source .`（Cloud Build から
# ビルド→AR push→デプロイ）の単段構成にする。scale-to-zero は Cloud Run 既定。
#
# 前提（各自の GCP で1度だけ設定＝この workflow の外）:
#   1. Workload Identity 連携（WIF）：GitHub OIDC を信頼する Provider と、Cloud Run/AR/Cloud Build 権限を
#      持つデプロイ用サービスアカウント。鍵 JSON は作らない（鍵レス）。
#   2. リポジトリ変数（Settings > Secrets and variables > Actions > Variables）:
#        GCP_PROJECT_ID / GCP_REGION / CLOUD_RUN_SERVICE / WIF_PROVIDER / DEPLOY_SA
#      任意: GEMINI_MODEL / RAG_CORPUS / AGENT_ENGINE_ID / POLICY_STORE_URI / CLOUDSQL_INSTANCE
#      （未設定なら RAG/Memory/指針GCS/書類アーカイブは降格＝§9/Phase 1）。
#      任意 secret: DATABASE_URL（書類アーカイブの接続 URL。パスワードを含むため variable でなく secret）。
#   WIF/変数が未設定なら job は skip する（誤発火・赤化を避ける）。決定論 CI（ci.yml）とは別物。

name: Deploy (Cloud Run)

on:
  workflow_dispatch: {}
  push:
    branches: [main]

# WIF で OIDC トークンを発行するため id-token: write が必須（鍵レス認証）。
permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: build & deploy to Cloud Run
    runs-on: ubuntu-latest
    # WIF/変数が未設定の環境（fork・未セットアップ）では実行しない。
    if: ${{ vars.WIF_PROVIDER != '' && vars.GCP_PROJECT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF / keyless)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (build from source, scale-to-zero)
        # 書類アーカイブ（Cloud SQL・Phase 1）は任意配線：
        #   - vars.CLOUDSQL_INSTANCE（<PROJECT:REGION:INSTANCE>）→ unix ソケットをマウント
        #   - secrets.DATABASE_URL（接続 URL・パスワード含むので secret）→ env に注入
        #   未設定なら従来どおり降格（record_store は skipped/空）。POLICY_STORE_URI（指針カードの
        #   GCS 永続化）も vars から渡す（未設定はローカル降格）。
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          ENV_VARS="GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PROJECT_ID }},GOOGLE_CLOUD_LOCATION=${{ vars.GCP_REGION }},GOOGLE_GENAI_USE_VERTEXAI=true,GEMINI_MODEL=${{ vars.GEMINI_MODEL }},RAG_CORPUS=${{ vars.RAG_CORPUS }},AGENT_ENGINE_ID=${{ vars.AGENT_ENGINE_ID }},POLICY_STORE_URI=${{ vars.POLICY_STORE_URI }}"
          EXTRA_FLAGS=()
          if [ -n "$DATABASE_URL" ]; then
            ENV_VARS="$ENV_VARS,DATABASE_URL=$DATABASE_URL"
          fi
          if [ -n "${{ vars.CLOUDSQL_INSTANCE }}" ]; then
            EXTRA_FLAGS+=(--add-cloudsql-instances "${{ vars.CLOUDSQL_INSTANCE }}")
          fi
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --source . \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --platform managed \
            --min-instances 0 \
            --allow-unauthenticated \
            "${EXTRA_FLAGS[@]}" \
            --set-env-vars "$ENV_VARS"
