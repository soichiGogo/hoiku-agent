[project]
name = "hoiku-agent"
version = "0.1.0"
description = "保育士の書類作成を支援するAIエージェント（DevOps × AI Agent Hackathon 2026）"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    # Google ADK（エージェント本体）
    "google-adk>=0.3.0",
    # Vertex AI（Gemini / RAG Engine / Agent Engine）
    "google-cloud-aiplatform[adk,agent-engines]>=1.95.0",
    # 設定・スキーマ
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hoiku_agent"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
