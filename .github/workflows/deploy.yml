# Cloud Run デプロイ（層A＝配信・設計コンテキスト §11/§12）。WIF（鍵レス）＋ Artifact Registry。
# 設計の「層A は前提点・こなれた普通で十分」に沿い、`gcloud run deploy --source .`（Cloud Build から
# ビルド→AR push→デプロイ）の単段構成にする。scale-to-zero は Cloud Run 既定。
#
# DB スキーマは deploy の前に自動適用する：CLOUDSQL_INSTANCE 設定時、deploy 直前に Cloud SQL Auth Proxy
# 経由で `alembic upgrade head` を当て、コードとスキーマを同じ deploy で前進させる（migration drift の
# 再発防止＝§ prod-db-migration-drift。additive/expand 前提・失敗時は deploy を止める）。従来の手動
# `alembic upgrade head` は初回セットアップ／破壊的変更時の fallback として docs/ライブ実行手順.md に残す。
#
# 前提（各自の GCP で1度だけ設定＝この workflow の外）:
#   1. Workload Identity 連携（WIF）：GitHub OIDC を信頼する Provider と、Cloud Run/AR/Cloud Build 権限を
#      持つデプロイ用サービスアカウント。鍵 JSON は作らない（鍵レス）。Provider には自リポ限定の
#      attribute condition を付ける（他リポが pool へ入れない＝WIF ベストプラクティス。手順は docs/ライブ実行手順.md）。
#      DB 自動 migration を使う（CLOUDSQL_INSTANCE 設定）なら DEPLOY_SA に追加で
#      `roles/cloudsql.client`（proxy 接続）＋ DB URL secret への `roles/secretmanager.secretAccessor` を付与する。
#   2. リポジトリ変数（Settings > Secrets and variables > Actions > Variables）:
#        GCP_PROJECT_ID / GCP_REGION / CLOUD_RUN_SERVICE / WIF_PROVIDER / DEPLOY_SA
#      推奨: RUNTIME_SA（Cloud Run の実行 SA＝最小権限。未設定だと既定 Compute SA=過剰権限に降格・警告を出す）
#      任意: GEMINI_MODEL / MODEL_LOCATION（生成モデルの location・既定 global＝gemini-3.5-flash 用）/
#            RAG_CORPUS / AGENT_ENGINE_ID / CLOUDSQL_INSTANCE / GOOGLE_OAUTH_CLIENT_ID
#            MAX_INSTANCES（インスタンス上限＝コスト/濫用の実質ストッパ・既定 4）
#            DATABASE_URL_SECRET（Secret Manager のシークレット名＝推奨の DB 接続注入経路）
#            TRACE_TO_CLOUD（Cloud Trace へのスパンエクスポート＝可観測性・既定 true。実行 SA に
#              roles/cloudtrace.agent が必要＝docs/ライブ実行手順.md §1。切るなら false を設定）
#      （未設定なら RAG/Memory/DB（アーカイブ＋指針）は降格＝§9/Phase 1/2）。
#      任意 secret: DATABASE_URL（Secret Manager を使わない場合の後方互換フォールバック＝平文 env 注入。
#        推奨は上の DATABASE_URL_SECRET（Secret Manager にパスワードを置き Cloud Run が参照）。
#        SESSION_SECRET（Google Sign-In 後の session cookie 署名用・32 bytes 以上の乱数。Cloud Run 環境変数へ注入）。
#   認証ポリシー: 案内画面を先に出すため Cloud Run IAP は `--no-iap` にし、公開到達後の `/app/`・API は
#      アプリ内 Google Sign-In session で fail-closed にする。GOOGLE_OAUTH_CLIENT_ID / SESSION_SECRET が無い deploy は失敗させる。
#   WIF/変数が未設定なら job は skip する（誤発火・赤化を避ける）。決定論 CI（ci.yml）とは別物。

name: Deploy (Cloud Run)

on:
  workflow_dispatch: {}
  push:
    branches: [main]

# WIF で OIDC トークンを発行するため id-token: write が必須（鍵レス認証）。
permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: build & deploy to Cloud Run
    runs-on: ubuntu-latest
    # WIF/変数が未設定の環境（fork・未セットアップ）では実行しない。
    if: ${{ vars.WIF_PROVIDER != '' && vars.GCP_PROJECT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF / keyless)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # DB スキーマを deploy の前に code head まで前進させ、migration drift を構造的に無くす
      # （§ prod-db-migration-drift＝手動忘れで本番 DB がコードから遅延しテーブル欠落→record_store が
      # fail-loud で 500 になる再発トラップ）。additive/expand 前提（新テーブル・nullable 列は旧コードに
      # 無害）。破壊的変更は expand→contract の規律で別 deploy に分ける。CLOUDSQL_INSTANCE 未設定の環境は
      # DB 非配線＝skip（既存の降格思想と一貫）。失敗時は job が止まり、壊れたスキーマで新コードを出さない。
      - name: Set up uv (Alembic 実行用)
        if: ${{ vars.CLOUDSQL_INSTANCE != '' }}
        uses: astral-sh/setup-uv@v5

      - name: Apply DB migrations to Cloud SQL (deploy の前に upgrade head)
        # 前提: DEPLOY_SA に roles/cloudsql.client（proxy 接続）＋ 対象 secret への
        # roles/secretmanager.secretAccessor（DB URL 取得）。DB URL は Secret Manager（推奨）優先／
        # GH secret フォールバック（deploy と同じ2経路）。alembic は main 依存＝uv の venv で走る。
        if: ${{ vars.CLOUDSQL_INSTANCE != '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail

          # 1) DB 接続 URL を解決（Secret Manager 優先／GH secret フォールバック）。ログには出さない。
          if [ -n "${{ vars.DATABASE_URL_SECRET }}" ]; then
            RAW_URL="$(gcloud secrets versions access latest \
              --secret="${{ vars.DATABASE_URL_SECRET }}" --project "${{ vars.GCP_PROJECT_ID }}")"
          elif [ -n "${DATABASE_URL:-}" ]; then
            RAW_URL="$DATABASE_URL"
          else
            echo "::warning::DB URL 未解決（DATABASE_URL_SECRET / secrets.DATABASE_URL いずれも無し）＝migration skip。"
            exit 0
          fi
          echo "::add-mask::$RAW_URL"

          # 2) Cloud SQL Auth Proxy を起動（WIF の ADC で認証・TCP 127.0.0.1:5433）。
          curl -sSL -o cloud-sql-proxy \
            "https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.23.0/cloud-sql-proxy.linux.amd64"
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy "${{ vars.CLOUDSQL_INSTANCE }}" --port 5433 &
          PROXY_PID=$!
          trap 'kill "$PROXY_PID" 2>/dev/null || true' EXIT
          for _ in $(seq 1 60); do
            (exec 3<>/dev/tcp/127.0.0.1/5433) 2>/dev/null && break
            sleep 0.5
          done

          # 3) Cloud Run 向けの socket 形式 URL を TCP(127.0.0.1:5433) へ付け替え（password 表記は保持）。
          TCP_URL="$(python3 -c 'import sys; u=sys.argv[1].strip(); s,r=u.split("://",1); ui,hp=r.split("@",1); d=hp.split("?",1)[0].lstrip("/") or "hoiku"; print(f"{s}://{ui}@127.0.0.1:5433/{d}")' "$RAW_URL")"
          echo "::add-mask::$TCP_URL"

          # 4) code head まで適用（未適用ぶんだけ・additive・トランザクショナル）。
          DATABASE_URL="$TCP_URL" uv run alembic upgrade head

      - name: Deploy to Cloud Run (build from source, scale-to-zero)
        # 書類アーカイブ＋育つ指針（Cloud SQL・Phase 1/2）は任意配線：
        #   - vars.CLOUDSQL_INSTANCE（<PROJECT:REGION:INSTANCE>）→ unix ソケットをマウント
        #   - DB 接続 URL の注入は2経路（推奨→フォールバックの順に選ぶ）:
        #       (A) vars.DATABASE_URL_SECRET（Secret Manager のシークレット名）→ `--set-secrets` で参照【推奨】
        #       (B) secrets.DATABASE_URL（GH secret）→ `--set-env-vars` で平文注入【後方互換・非推奨】
        #     どちらも未設定なら降格（record_store は skipped/空・policy_store はローカル）。
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Google Sign-In 後の署名付き session cookie の鍵。Google OAuth client secret ではない。
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          # 実行 SA（最小権限）＝セキュリティ MUST。未設定は既定 Compute SA（Editor 相当を持ちうる）へ降格し警告する。
          EXTRA_FLAGS=()
          if [ -n "${{ vars.RUNTIME_SA }}" ]; then
            EXTRA_FLAGS+=(--service-account "${{ vars.RUNTIME_SA }}")
          else
            echo "::warning::RUNTIME_SA 未設定＝既定 Compute SA で稼働（過剰権限）。専用の最小権限 SA を推奨（docs/ライブ実行手順.md）。"
          fi

          # インスタンス上限＝コスト/濫用の実質ストッパ（予算アラートは止めない）。既定は控えめな 4。
          MAX_INSTANCES="${{ vars.MAX_INSTANCES }}"
          MAX_INSTANCES="${MAX_INSTANCES:-4}"

          # 生成モデルの location（既定モデル gemini-3.5-flash は Vertex global 専用＝models.build_model）。
          # RAG/Memory の GOOGLE_CLOUD_LOCATION（regional）とは分離する（§11）。既定 global。
          MODEL_LOCATION="${{ vars.MODEL_LOCATION }}"
          MODEL_LOCATION="${MODEL_LOCATION:-global}"

          # Cloud Trace へのスパンエクスポート（可観測性・server.py の trace_to_cloud）。既定 true＝
          # agent/LLM/ツール呼び出しの軌跡を Trace エクスプローラで追える。実行 SA に
          # roles/cloudtrace.agent が要る（未付与でも app は落ちない＝export エラーがログに出るだけ）。
          TRACE_TO_CLOUD="${{ vars.TRACE_TO_CLOUD }}"
          TRACE_TO_CLOUD="${TRACE_TO_CLOUD:-true}"

          if [ -z "${{ vars.GOOGLE_OAUTH_CLIENT_ID }}" ] || [ -z "$SESSION_SECRET" ]; then
            echo "::error::GOOGLE_OAUTH_CLIENT_ID（GitHub Variable）と SESSION_SECRET（GitHub Secret）が必要です。"
            exit 1
          fi
          ENV_VARS="GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PROJECT_ID }},GOOGLE_CLOUD_LOCATION=${{ vars.GCP_REGION }},GOOGLE_GENAI_USE_VERTEXAI=true,MODEL_LOCATION=$MODEL_LOCATION,GEMINI_MODEL=${{ vars.GEMINI_MODEL }},RAG_CORPUS=${{ vars.RAG_CORPUS }},AGENT_ENGINE_ID=${{ vars.AGENT_ENGINE_ID }},TRACE_TO_CLOUD=$TRACE_TO_CLOUD,GOOGLE_OAUTH_CLIENT_ID=${{ vars.GOOGLE_OAUTH_CLIENT_ID }},SESSION_SECRET=$SESSION_SECRET"

          # DB 接続の注入：Secret Manager（推奨）優先／無ければ GH secret の平文 env へフォールバック。
          if [ -n "${{ vars.DATABASE_URL_SECRET }}" ]; then
            EXTRA_FLAGS+=(--set-secrets "DATABASE_URL=${{ vars.DATABASE_URL_SECRET }}:latest")
          elif [ -n "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL を平文 env で注入中（Cloud Run リビジョンに露出）。Secret Manager 化（DATABASE_URL_SECRET）を推奨。"
            ENV_VARS="$ENV_VARS,DATABASE_URL=$DATABASE_URL"
          fi

          # Cloud Run IAP はリクエストがアプリへ届く前に強制転送するため、案内画面からログインを
          # 明示開始する UX と両立しない。IAP を確実に解除し、アプリ内 session が /app/ と API を守る。
          EXTRA_FLAGS+=(--no-iap --allow-unauthenticated)
          if [ -n "${{ vars.CLOUDSQL_INSTANCE }}" ]; then
            EXTRA_FLAGS+=(--add-cloudsql-instances "${{ vars.CLOUDSQL_INSTANCE }}")
          fi
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --source . \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --platform managed \
            --min-instances 0 \
            --max-instances "$MAX_INSTANCES" \
            --labels "component=web,managed-by=github-actions" \
            "${EXTRA_FLAGS[@]}" \
            --set-env-vars "$ENV_VARS"
