# 層B eval-gate（設計コンテキスト §12「AI版回帰テスト」）。
#
# fail-closed 契約:
#   - 設定/IAM/モデル/ケース/rubric/baseline のどれかが欠けたら非0終了（skipを緑にしない）。
#   - 全ケース×全6 rubrics、軸/ケースfloor、main baseline非劣化、must_fix 0を満たして初めて緑。
#   - baseline は nightly で自動更新しない。人が --update-baseline で採点し通常PRでレビューする。
#
# 前提（Terraform + GitHub Variables）:
#   - infra/iam.tf の eval-runner SA（roles/aiplatform.userのみ）を apply 済み。
#   - EVAL_SA=eval-runner@<PROJECT>.iam.gserviceaccount.com
#   - WIF_PROVIDER / GCP_PROJECT_ID / GCP_REGION / GEMINI_MODEL / MODEL_LOCATION

name: Eval Gate (層B・strict)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 18 * * 0" # 毎週月曜 03:00 JST（18:00 UTC）。基準は更新せず監視のみ。
  pull_request:
    paths:
      - ".github/workflows/eval-gate.yml"
      - "eval/**"
      - "knowledge/文書作成指針.json"
      - "pyproject.toml"
      - "uv.lock"
      - "src/hoiku_agent/agents/**"
      - "src/hoiku_agent/harness/**"
      - "src/hoiku_agent/models.py"
      - "src/hoiku_agent/config.py"
      - "src/hoiku_agent/schemas/**"
      - "tests/test_eval.py"
      - "tests/test_eval_gate.py"
      - "tests/test_eval_cases.py"

permissions:
  contents: read
  id-token: write

concurrency:
  group: eval-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval-gate:
    name: rubric eval gate (strict・3票多数決)
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
      GOOGLE_CLOUD_PROJECT: ${{ vars.GCP_PROJECT_ID }}
      GOOGLE_CLOUD_LOCATION: ${{ vars.GCP_REGION }}
      GOOGLE_GENAI_USE_VERTEXAI: "true"
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
      MODEL_LOCATION: ${{ vars.MODEL_LOCATION }}
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
      EVAL_SA: ${{ vars.EVAL_SA }}
      EVENT_NAME: ${{ github.event_name }}
      REPOSITORY: ${{ github.repository }}
      PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
      PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate eval configuration (fail-closed)
        shell: bash
        run: |
          set -euo pipefail
          required=(GOOGLE_CLOUD_PROJECT GOOGLE_CLOUD_LOCATION GEMINI_MODEL MODEL_LOCATION WIF_PROVIDER EVAL_SA)
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::必須のGitHub Variable ${name} が未設定です"
              exit 1
            fi
          done
          if [[ "${EVENT_NAME}" == "pull_request" && "${PR_HEAD_REPOSITORY}" != "${REPOSITORY}" ]]; then
            echo "::error::外部forkのコードへGCP OIDCを渡さないため、保守者が同一repo branchへ取り込んで再実行してください"
            exit 1
          fi

      - name: Authenticate to Google Cloud (WIF / eval-runner)
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.EVAL_SA }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (google-adk[eval])
        run: uv sync --extra dev --extra eval --locked

      - name: Pin comparison baseline to PR base
        shell: bash
        run: |
          mkdir -p eval/results
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            git show "${PR_BASE_SHA}:eval/baseline.json" > eval/results/comparison-baseline.json
          else
            cp eval/baseline.json eval/results/comparison-baseline.json
          fi

      - name: Run eval gate (strict)
        run: >-
          uv run --extra dev --extra eval python eval/run_gate.py
          --strict --baseline-path eval/results/comparison-baseline.json
          --bootstrap-baseline-path eval/baseline.json
          --output eval/results/gate-result.json

      - name: Upload per-case eval evidence
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: eval-gate-${{ github.run_id }}
          path: |
            eval/results/gate-result.json
            eval/results/comparison-baseline.json
          if-no-files-found: warn
          retention-days: 30
